                                <td><input type="hidden" name="channels[<?= $ch['channel_id'] ?>][channel_status]" value="0"><input type="checkbox" name="channels[<?= $ch['channel_id'] ?>][channel_status]" value="1" <?= ($ch['channel_status']??'0')==='1'?'checked':'' ?>></td>

<script>
let channelCount = <?= count($channels) ?>;
function addChannel(){
    channelCount++;
    const tbody = document.querySelector('table tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = '<td><input type="hidden" name="channels['+channelCount+'][channel_id]" value="0">'+channelCount+'</td><td><input type="text" name="channels['+channelCount+'][channel_name]" placeholder="渠道名称"></td><td><input type="text" name="channels['+channelCount+'][channel_url]" placeholder="https://api.example.com/api.php/provide/vod/"></td><td><input type="hidden" name="channels['+channelCount+'][channel_status]" value="0"><input type="checkbox" name="channels['+channelCount+'][channel_status]" value="1" checked></td><td><input type="number" name="channels['+channelCount+'][channel_sort]" value="0" style="width:60px;"></td><td><button type="button" class="btn btn-danger btn-sm" onclick="this.closest(\'tr\').remove()">删除</button></td>';
    tbody.appendChild(tr);
}
</script>
